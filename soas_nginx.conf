server {
    listen 80;
    server_name pmaihome.com www.pmaihome.com;

    location /alpha-labs/SOAS/ {
        alias /var/www/alpha-labs/SOAS/;
        index index.html;
        try_files $uri $uri/ /alpha-labs/SOAS/index.html;
    }

    # API 代理 (留给未来真正的后端)
    location /alpha-labs/SOAS/api/ {
        proxy_pass http://localhost:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
